# commentray:start id=toml-lede
[storage]
dir = ".commentray"
# commentray:end id=toml-lede

# commentray:start id=toml-scm
[scm]
provider = "git"
# commentray:end id=toml-scm

# commentray:start id=toml-render
[render]
mermaid = true
syntaxTheme = "github-dark"
relative_github_blob_links = true
# commentray:end id=toml-render

# commentray:start id=toml-anchors
[anchors]
defaultStrategy = [ "symbol", "lines" ]
# commentray:end id=toml-anchors

# commentray:start id=toml-static-site
[static_site]
title = "Commentray"
github_url = "https://github.com/d-led/commentray"
# Stretch (when layout is stretch): default is flow-synchronizer (BufferingFlowSynchronizer). Opt out:
# stretch_buffer_sync = "table"
# Optional source-link base when _site/ doesn't host repo files:
# source_link_prefix = "https://github.com/d-led/commentray/blob/main"
default_source_file = "README.md"
default_angle = "main"
github_blob_branch = "main"
# commentray:end id=toml-static-site

# commentray:start id=toml-angles
[angles]
default_angle = "main"

  [[angles.definitions]]
  id = "main"
  title = "Main"

  [[angles.definitions]]
  id = "architecture"
  title = "Architecture"
# commentray:end id=toml-angles

# commentray:start id=toml-pointers
# (Normative block text lives in companion Markdown — "Pointers" section.)
# commentray:end id=toml-pointers

# commentray:start id=toml-buffering-flow-sync
# BufferingFlowSynchronizer — source: packages/core/src/buffering-flow-synchronizer.ts
# Sketch (column tracing, constraints in pipeline order):
#   • Treat each column as an ordered list of HeightAdjustable segments (height + bufferAbove/below).
#     Only ids matching R{N}XX pair across columns; everything else stays local (compact).
#   1) Region height: for each shared R id, max(height); set bufferBelow on the shorter region so both
#      sides span the same region height.
#   2) Region start rows: re-measure “start row before first content line” for each paired R; if
#      starts differ, prefer shrinking bufferAbove on the side that starts *later* (down to 0),
#      then add bufferAbove on the earlier-start side only if still misaligned (minimal slack;
#      avoids a full symmetric BBBB/BBBB zip row when the parse already over-padded one side).
#   3) Column totals: if one column is shorter, add tail slack only on non-R blocks (bufferBelow on
#      the last item if it is not R{N}XX), else append paired __NON_SYNC_TAIL_SLACK__ placeholders
#      so left/right array lengths stay aligned for stretch-row zip.
#   4) Do **not** move `bufferBelow` between paired R copies: that would change each column’s scroll
#      total and force stacked tail `BBBB` rows when (3) re-pads. Closing buffer stays on the side
#      that owns the shorter region’s `bufferBelow` from step (1).
# Approval round-trip: parse grids → synchronize → print (packages/core/src/approval-flow-grid.ts,
# buffering-flow-synchronizer-approval-printer.ts). Harness invariants (see
# buffering-flow-synchronizer.approval.test.ts): equal column scroll totals after sync; never `BBBB`
# in both cells on one ASCII line (split to stagger); many consecutive `BBBB` rows in one column are OK
# when slack depth requires it; only `R{N}XX` pairs get region sync — plain `XXXX` blocks never use
# stagger-as-region-height (stagger geometry is only inside an `R…XX` block); one full-width blank row
# between consecutive `HeightAdjustable` items (visual only; never 0, never double-stacked blank lines).
# Synced-region continuations: `XXXX` only where that column had a body line; stagger (empty cell,
# partner ink) reprints as spaces in that cell — not a spurious `XXXX` (see `syncRegionContinuationRows`).
# commentray:end id=toml-buffering-flow-sync
