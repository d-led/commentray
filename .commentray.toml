[storage]
dir = ".commentray"

[scm]
provider = "git"

[render]
mermaid = true
syntaxTheme = "github-dark"
relative_github_blob_links = true

[anchors]
defaultStrategy = [ "symbol", "lines" ]

[static_site]
title = "Commentray"
github_url = "https://github.com/d-led/commentray"
default_source_file = "README.md"
default_angle = "main"
github_blob_branch = "main"

[angles]
default_angle = "main"

  [[angles.definitions]]
  id = "main"
  title = "Main"

  [[angles.definitions]]
  id = "architecture"
  title = "Architecture"

