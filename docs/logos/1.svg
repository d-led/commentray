<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
    <title id="title">Film Strip &amp; Speech Bubble Logo</title>
    <desc id="desc">Professional minimalist 35mm film strip combined with speech bubble</desc>
  
    <!-- Professional 35mm Film Strip -->
    <!-- Film strip background (deep navy) -->
    <rect 
      x="7" y="13" width="31" height="41" rx="4" 
      fill="#1e2937" stroke="#334155" stroke-width="3.5"/>
  
    <!-- Film frames (subtle contrast) -->
    <rect x="12.5" y="18" width="10" height="7.5" fill="#475569"/>
    <rect x="12.5" y="28.5" width="10" height="7.5" fill="#475569"/>
    <rect x="12.5" y="39" width="10" height="7.5" fill="#475569"/>
  
    <!-- Clean sprocket holes (warm gold) -->
    <rect x="8.5" y="16.5" width="2.5" height="2.5" fill="#fbbf24"/>
    <rect x="8.5" y="26" width="2.5" height="2.5" fill="#fbbf24"/>
    <rect x="8.5" y="35.5" width="2.5" height="2.5" fill="#fbbf24"/>
    <rect x="8.5" y="45" width="2.5" height="2.5" fill="#fbbf24"/>
  
    <rect x="31" y="16.5" width="2.5" height="2.5" fill="#fbbf24"/>
    <rect x="31" y="26" width="2.5" height="2.5" fill="#fbbf24"/>
    <rect x="31" y="35.5" width="2.5" height="2.5" fill="#fbbf24"/>
    <rect x="31" y="45" width="2.5" height="2.5" fill="#fbbf24"/>
  
    <!-- Professional Speech Bubble (warm gold, overlapping ~50%) -->
    <!-- Bubble body -->
    <path 
      d="M36 20 Q36 14.5 43 14.5 H57.5 Q63 14.5 63 20 V34 Q63 39 57.5 39 H48.5 L44 46 L43 39 Q36 39 36 34 Z" 
      fill="#fcd34d" stroke="#1e2937" stroke-width="3.5"/>
  
    <!-- Simple tail -->
    <path 
      d="M44 39 L46.5 44.5 L48.5 39 Z" 
      fill="#fcd34d" stroke="#1e2937" stroke-width="3" stroke-linejoin="round"/>
  
  </svg>
