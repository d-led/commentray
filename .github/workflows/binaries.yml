# Standalone `commentray` CLI (Node SEA) per OS/arch.
#
# - **Workflow artifacts** (`actions/upload-artifact`): short-lived by design
#   (`retention-days` below). Use them to debug a run or bridge jobs in this workflow only.
# - **GitHub Releases** (job `release` on `v*` tags): attaches standalone CLI binaries (all
#   targets), the packaged VS Code extension (`.vsix`), and release notes. Prefer Releases over
#   re-downloading expired workflow artifacts.
#
# npm packages are **not** published from Actions (maintainers publish locally with 2FA); see README / CONTRIBUTING.
name: binaries

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: macos-14
            target: darwin-arm64
          - os: windows-2022
            target: windows-x64
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Build CLI bundle
        run: npm run build:bundle -w @commentray/cli

      - name: Build standalone binary
        shell: bash
        run: node scripts/build-binary.mjs

      - name: Smoke test binary
        shell: bash
        run: node scripts/smoke-binary.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: commentray-${{ matrix.target }}
          path: packages/cli/dist/bin/commentray-*
          if-no-files-found: error
          # Expire CI blobs automatically; tagged releases copy these into GitHub Release assets first.
          retention-days: 14

  vsix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Install VSIX packaging tools (icon rasterization)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Package VS Code extension (.vsix)
        run: npm run extension:package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: commentray-vsix
          path: packages/vscode/dist/commentray-vscode-*.vsix
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [build, vsix]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage release attachments
        run: |
          mkdir -p release-binaries
          find artifacts -type f -name 'commentray-*' -exec cp -v {} release-binaries/ \;
          ls -lah release-binaries/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-binaries/*
          generate_release_notes: true
