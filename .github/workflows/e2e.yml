# Manual static-site E2E (same steps as ci / e2e-static). Default branch only — no workflow_run in this file (CodeQL untrusted-checkout).
name: e2e

on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    container:
      # Pin to lockfile Cypress (see ci.yml e2e-static job).
      image: cypress/included:15.14.0
      options: --ipc=host
    steps:
      - uses: actions/checkout@v6

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Build static site
        run: npm run pages:build

      - name: Validate Pages GitHub/blob + browse link shapes
        run: node scripts/validate-pages-github-links.mjs
        env:
          COMMENTRAY_VALIDATE_PAGES_LIVE: "1"

      - name: Start static server
        run: |
          mkdir -p test-results
          nohup npm run e2e:server > /tmp/e2e-serve.log 2>&1 &
          echo $! > /tmp/e2e-serve.pid

      - name: Wait for server
        run: |
          n=0
          until node -e "require('http').get('http://127.0.0.1:14173/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"; do
            n=$((n+1))
            [ "$n" -ge 60 ] && exit 1
            sleep 1
          done

      - name: Run E2E tests (with JUnit reporter)
        run: |
          npx cypress run --e2e --browser chrome --config-file cypress.config.ts --config baseUrl=http://127.0.0.1:14173
        env:
          CYPRESS_CI: true
          NODE_OPTIONS: --dns-result-order=ipv4first

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results
            cypress/videos
            cypress/screenshots

      - name: Publish JUnit to GitHub Checks
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Test reports
          path: test-results/*.xml
          reporter: java-junit
