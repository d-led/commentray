# VS Code extension integration tests (@vscode/test-cli + Extension Development Host).
# Kept separate from the main CI workflow so Electron + xvfb stays optional and fast
# enough to run on every PR; narrow triggers here if this job grows too heavy.

name: vscode-extension

on:
  push:
    branches: [main]
    paths: &vscode-extension-paths
      - ".github/workflows/ci-vscode-extension.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "tsconfig.json"
      - "scripts/test-vscode-extension.sh"
      - "packages/core/**"
      - "packages/vscode/**"
  pull_request:
    paths: *vscode-extension-paths

concurrency:
  group: vscode-extension-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install xvfb (Electron / VS Code UI)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Cache VS Code test download
        uses: actions/cache@v4
        with:
          path: packages/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('package-lock.json', 'packages/vscode/package.json') }}

      - name: Run VS Code extension tests
        run: bash scripts/test-vscode-extension.sh
        env:
          CI: true
