# VS Code extension integration tests (@vscode/test-cli + Extension Development Host).
# Separate workflow (Electron + xvfb); triggers match main CI so extension tests always
# run with other checks. Revisit path filters only if this job becomes a bottleneck.

name: vscode-extension

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: vscode-extension-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Keep the pinned version in sync with `engines.vscode` in
        # packages/vscode/package.json (minimum supported API surface).
        vscode_version: [stable, "1.95.0"]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install xvfb (Electron / VS Code UI)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Cache VS Code test download
        uses: actions/cache@v5
        with:
          path: packages/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ matrix.vscode_version }}-${{ hashFiles('package-lock.json', 'packages/vscode/package.json') }}

      - name: Run VS Code extension tests
        run: bash scripts/test-vscode-extension.sh
        env:
          CI: true
          VSCODE_TEST_VERSION: ${{ matrix.vscode_version }}
