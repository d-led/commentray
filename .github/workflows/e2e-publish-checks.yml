# Publishes Cypress JUnit from the completed `ci` run to GitHub Checks.
# workflow_run uses base-repo token + checks:write. Checkout is default branch only (never workflow_run.head_sha); Cypress runs in ci.yml e2e-static.
name: e2e-publish-checks

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

concurrency:
  group: e2e-publish-checks-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      # Default-branch checkout only (no workflow_run.head_sha). test-reporter runs git and fails without .git/
      - uses: actions/checkout@v5

      - name: Download E2E artifacts from CI run
        uses: actions/download-artifact@v7
        with:
          name: e2e-ci-bundle
          path: .
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Publish JUnit to GitHub Checks
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Test reports
          path: test-results/*.xml
          reporter: java-junit
