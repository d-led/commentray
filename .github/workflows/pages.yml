# `_site/` → GitHub Pages. Settings → Pages → Source: GitHub Actions.
# Runs after `ci` succeeds on `main` (that workflow includes Cypress in `e2e-static`).

name: pages

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

concurrency:
  group: pages-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  # Stale `github-pages` artifacts break deploy-pages without `actions: write`.
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run pages:build
        env:
          COMMENTRAY_PAGES_BUILD_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Validate Pages GitHub/blob + browse link shapes
        run: node scripts/validate-pages-github-links.mjs
        env:
          COMMENTRAY_VALIDATE_PAGES_LIVE: "1"

      - name: Remove stale github-pages artifacts from earlier attempts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ids=$(gh api --paginate "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages" and .expired == false) | .id')
          if [ -z "$ids" ]; then
            echo "No stale github-pages artifacts."
            exit 0
          fi
          for id in $ids; do
            echo "Deleting stale github-pages artifact $id"
            gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$id"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
