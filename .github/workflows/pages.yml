# Build `_site/` with `@commentray/code-commentray-static` + `.commentray.toml` [static_site], deploy to GitHub Pages.
# Repository Settings → Pages → Source: GitHub Actions.

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # `actions: write` lets the cleanup step below delete stale `github-pages`
  # artifacts that earlier run attempts may have left behind; without this,
  # re-running the workflow fails in `actions/deploy-pages` with
  # "Multiple artifacts named 'github-pages' were unexpectedly found".
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run pages:build
        env:
          # Burn into HTML footer via `scripts/build-static-pages.mjs` (validated in render).
          COMMENTRAY_PAGES_BUILD_SHA: ${{ github.sha }}

      - name: Validate Pages GitHub/blob + browse link shapes
        run: node scripts/validate-pages-github-links.mjs
        env:
          COMMENTRAY_VALIDATE_PAGES_LIVE: "1"

      - name: Remove stale github-pages artifacts from earlier attempts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ids=$(gh api --paginate "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages" and .expired == false) | .id')
          if [ -z "$ids" ]; then
            echo "No stale github-pages artifacts."
            exit 0
          fi
          for id in $ids; do
            echo "Deleting stale github-pages artifact $id"
            gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$id"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
