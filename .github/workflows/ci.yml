name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        package-manager: [npm]
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Quick CI
        run: bash scripts/quality-gate.sh

      - name: Integration tests
        run: npm run test:integration

  # Cypress + static site (unprivileged). JUnit → GitHub Checks runs in e2e-publish-checks.yml (workflow_run, no PR SHA checkout).
  e2e-static:
    name: E2E static site
    needs: quick
    runs-on: ubuntu-latest
    container:
      image: cypress/included:latest
      options: --ipc=host
    steps:
      - uses: actions/checkout@v5

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Build static site
        run: npm run pages:build

      - name: Start static server
        run: |
          mkdir -p test-results
          nohup npm run e2e:server > /tmp/e2e-serve.log 2>&1 &
          echo $! > /tmp/e2e-serve.pid

      - name: Wait for server
        run: |
          n=0
          until node -e "require('http').get('http://127.0.0.1:14173/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"; do
            n=$((n+1))
            [ "$n" -ge 60 ] && exit 1
            sleep 1
          done

      - name: Run E2E tests (with JUnit reporter)
        run: |
          npx cypress run --e2e --browser chrome --config-file cypress.config.ts --config baseUrl=http://127.0.0.1:14173
        env:
          CYPRESS_CI: true
          NODE_OPTIONS: --dns-result-order=ipv4first

      - name: Upload E2E bundle for Checks workflow
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-ci-bundle
          path: |
            test-results
            cypress/videos
            cypress/screenshots
