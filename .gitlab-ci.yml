# Static site E2E — same shape as local `npm run e2e` (pages:build → serve :4173 → Cypress).
# Uses a Cypress browser image so Chrome is available on the runner.

variables:
  CYPRESS_CI: "true"
  npm_config_cache: "${CI_PROJECT_DIR}/.npm"
  CYPRESS_CACHE_FOLDER: "${CI_PROJECT_DIR}/.cache/Cypress"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - .cache/Cypress/

stages:
  - e2e

static-site-e2e:
  stage: e2e
  image: cypress/browsers:node-22.14.0-chrome131-1-ff-131.0.3-1
  before_script:
    - mkdir -p test-results
  script:
    - npm ci
    - npm run e2e:ci
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: test-results/junit-*.xml
    paths:
      - test-results/
      - cypress/videos/
      - cypress/screenshots/
